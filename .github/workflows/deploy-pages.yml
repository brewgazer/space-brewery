# Build static site → GitHub Pages
#
# REQUIRED ONCE (or this workflow fails with "Get Pages site failed"):
#   Repository → Settings → Pages → Build and deployment → Source: "GitHub Actions"
#   (Save; you do NOT need to pick a branch — Actions is the source.)

name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Use Node 24 for JS-based Actions (checkout, configure-pages, etc.) — avoids Node 20 deprecation warnings.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Package static site
        run: node scripts/package-pages.mjs

      - name: Inject production relay URL (secret)
        env:
          BREW_RELAY_WSS_URL: ${{ secrets.BREW_RELAY_WSS_URL }}
          INDEX_PATH: ${{ github.workspace }}/_site/index.html
        run: node scripts/set-relay-for-pages.mjs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
